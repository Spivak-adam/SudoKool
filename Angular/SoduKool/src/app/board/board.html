<table>
    <tbody>
  @for (row of board; track $index; let rowIndex = $index) {
    <tr>
      @for (cell of row; track $index; let colIndex = $index) {
        <td>
          <input [id]="'cell-'+ rowIndex +'-'+ colIndex" type="text"
           (input)="onInputChange($event)" />
        </td>
      }
    </tr>
  }
  </tbody>
</table>
